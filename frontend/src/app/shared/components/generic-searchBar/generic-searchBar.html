<div class="search-box">
  <span class="icon-wrap">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M10.5 4a6.5 6.5 0 1 1 0 13 6.5 6.5 0 0 1 0-13Zm0 2a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9Zm5.65 10.24 3.6 3.6-1.41 1.41-3.6-3.6 1.41-1.41Z" />
    </svg>
  </span>
  <input
    type="search"
    [placeholder]="placeholder"
    [(ngModel)]="searchQuery"
    (ngModelChange)="onSearchChange($event)"
  />

  @if (searchQuery) {
    <button class="clear-button" type="button" (click)="searchQuery = ''; onSearchChange('')">
      x
    </button>
  }
</div>
